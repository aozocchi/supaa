# Supaa keybind-lock submap — hyprlang syntax (Hyprland < 0.55, or users
# who haven't migrated to hyprland.lua yet; hyprlang remains supported for
# 1-2 releases after 0.55 per the official deprecation notice).
#
# This file is generated by the Supaa installer and meant to be sourced
# from your main config, NOT pasted into it directly — that way
# `supaa --uninstall` can cleanly remove just this file plus the one
# `source=` line, without touching anything else you've written.
#
#   echo 'source = ~/.config/hypr/hypr-supaa.conf' >> ~/.config/hypr/hyprland.conf
#   hyprctl reload

# ── Global escape hatch (works regardless of active submap) ───────────────────
#
# Super+Shift+Q exits Supaa++ by setting mode back to Normal.  This is a
# *direct, immediate* restore — no popup — so it works even when the Supaa
# UI window does not have keyboard focus.  The popup confirmation is only
# shown when you click the UI button or press Super+Shift+Q while the Supaa
# window is focused.
#
# Super+Escape is kept as a secondary alias for muscle-memory compatibility.
#
# These binds are active in the DEFAULT (main) submap — i.e. when Supaa++
# is NOT engaged.  They are also repeated INSIDE the supaa_lock submap below
# because Hyprland submaps swallow all key events not explicitly bound within
# the active submap: without the repetition, Super+Shift+Q would be silently
# discarded while the lock is engaged.
bind = SUPER SHIFT, Q, exec, supaa mode normal
bind = SUPER, ESCAPE, exec, supaa mode normal

# ── Workspace-lock submap ──────────────────────────────────────────────────────
#
# When Supaa++ is active the daemon calls:
#   hyprctl dispatch submap supaa_lock
#
# Entering this submap swallows all key events that aren't explicitly bound
# here, which prevents workspace switching (Super+1..9, Super+arrow, etc.).
# The intentional absence of binds IS the lock.
#
# To leave the lock cleanly, the daemon calls:
#   hyprctl dispatch submap reset
#
# That happens automatically when you exit Supaa++ via the CLI or UI.
submap = supaa_lock
# Intentionally empty of workspace binds — that absence IS the lock.
#
# IMPORTANT: Hyprland submaps swallow all key events that are not explicitly
# bound within the active submap.  Binds defined outside this block are NOT
# active while supaa_lock is engaged, so the escape hatch MUST be repeated
# here.  Without this repetition, Super+Shift+Q would be swallowed by the
# submap and the user would have no way to exit Supaa++.
bind = SUPER SHIFT, Q, exec, supaa mode normal
bind = SUPER, ESCAPE, exec, supaa mode normal
submap = reset
